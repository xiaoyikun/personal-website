<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Art Portfolio</title>
  <meta name="description" content="Game art portfolio showcasing character design, scene concepts, UI design and more.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ========== 左侧固定导航 ========== -->
  <nav class="side-nav" id="sideNav">
    <div class="side-nav-inner">
      <!-- 姓名 -->
      <div class="side-nav-identity">
        <h1 class="side-nav-name" id="navName">Artist Name</h1>
        <p class="side-nav-name-cn" id="navNameCn"></p>
      </div>

      <!-- 作品系列列表 -->
      <ul class="side-nav-works" id="navWorksList">
        <!-- 由 script.js 动态渲染 -->
      </ul>

      <!-- 底部链接 -->
      <div class="side-nav-footer">
        <a href="#contact-page" class="side-nav-link" data-page="contact">Contact</a>
        <a href="#about-page" class="side-nav-link" data-page="about">About</a>
        <a href="#" class="side-nav-link side-nav-cv" id="navCV" style="display:none;">CV</a>
      </div>
    </div>
  </nav>

  <!-- 移动端菜单按钮 -->
  <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="菜单">
    <span></span><span></span><span></span>
  </button>
  <div class="mobile-overlay" id="mobileOverlay"></div>

  <!-- ========== 主内容区 ========== -->
  <main class="main-content" id="mainContent">

    <!-- 首页/封面 -->
    <section class="page page-active" id="home-page" data-page="home">
      <div class="page-bg" style="background-image:url('https://picsum.photos/seed/gameart-hero/1920/1080');"></div>
      <div class="page-overlay"></div>
      <div class="page-text page-text-center">
        <p class="page-tag">GAME ART &amp; DESIGN</p>
        <h2 class="page-title-red" id="heroTitle">Game Art Portfolio</h2>
        <p class="page-title-cn" id="heroTitleCn">游戏美术作品集</p>
      </div>
    </section>

    <!-- 作品详情页（由 JS 动态生成） -->
    <div id="workPages"></div>

    <!-- 关于页 -->
    <section class="page" id="about-page" data-page="about">
      <div class="page-bg" style="background-image:url('https://picsum.photos/seed/about-bg/1920/1080');"></div>
      <div class="page-overlay"></div>
      <div class="page-text page-text-about">
        <div class="about-content">
          <div class="about-avatar">
            <img id="aboutAvatar" src="https://picsum.photos/seed/gameartist/400/400" alt="头像">
          </div>
          <div class="about-bio">
            <p id="aboutBio1">专注于游戏美术的创作者。擅长角色设计、场景概念和UI设计。</p>
            <p id="aboutBio2">曾参与多款游戏项目的美术制作，致力于用视觉语言构建沉浸式的游戏世界。</p>
          </div>
          <div class="about-stats">
            <div class="about-stat"><span class="about-stat-num" id="statWorks">50+</span><span class="about-stat-label">作品</span></div>
            <div class="about-stat"><span class="about-stat-num" id="statProjects">10+</span><span class="about-stat-label">游戏项目</span></div>
            <div class="about-stat"><span class="about-stat-num" id="statYears">5</span><span class="about-stat-label">年经验</span></div>
          </div>
          <div class="about-social" id="aboutSocial">
            <!-- 由 JS 渲染 -->
          </div>
        </div>
      </div>
    </section>

    <!-- 联系页 -->
    <section class="page" id="contact-page" data-page="contact">
      <div class="page-bg" style="background-image:url('https://picsum.photos/seed/contact-bg/1920/1080');"></div>
      <div class="page-overlay page-overlay-dark"></div>
      <div class="page-text page-text-contact">
        <h2 class="page-title-red">Contact</h2>
        <p class="page-title-cn">联系方式</p>
        <div class="contact-items">
          <a href="mailto:artist@example.com" class="contact-item" id="contactEmail">artist@example.com</a>
          <a href="tel:+8613800138000" class="contact-item" id="contactPhone">138-0013-8000</a>
          <p class="contact-item" id="contactAddress">北京市朝阳区 798 艺术区</p>
        </div>
      </div>
    </section>

  </main>

  <script src="site-data.js"></script>
  <script src="script.js"></script>
</body>
</html>
